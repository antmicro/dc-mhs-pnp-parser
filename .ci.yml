image: node:23-bookworm

build:
  stage: build
  before_get_sources:
    - apt-get -qq update
    - apt-get -qqy install python3-venv wget unzip git
  before_script:
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install .
  script:
    - source .venv/bin/activate
    - wget -O Release_0_5_0.zip "https://drive.google.com/uc?id=1HaQbhgrJ--7bkkTC8bfA2pGSGGwdEeJm&export=download"
    - unzip Release_0_5_0.zip
    - pnp-parser "Release_0_5_0/JSON Files/Mockups/HPM/hpm-fru-mockup-type1-hpm-example-v0.6.8.json" hpm-fru-mockup-v0.6.8-spec.json hpm-fru-mockup-v0.6.8-dataflow.json
    # - python3 src/graph_aligner/graph_aligner.py write position.json hpm-fru-mockup-v0.6.8-dataflow.json
  artifacts:
    expire_in: 4 week
    when: always
    paths:
      - hpm-fru-mockup-v0.6.8-spec.json
      - hpm-fru-mockup-v0.6.8-dataflow.json

deploy:
  stage: deploy
  tags: [docs]
  dependencies: [build]
  variables:
    GIT_STRATEGY: none
  script:
    - tar cf $CI_DOCS_ARCHIVE hpm-fru-mockup-v0.6.8-*.json
  artifacts:
    paths:
      - $CI_DOCS_ARCHIVE
